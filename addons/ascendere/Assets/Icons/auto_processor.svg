<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a90e2" />
            <stop offset="100%" style="stop-color:#2c5aa0" />
        </linearGradient>
    </defs>

    <!-- Main processor chip -->
    <rect x="4" y="5" width="8" height="6" rx="1" fill="url(#chipGradient)" stroke="#1a4480" stroke-width="0.5" />

    <!-- Input pins (left) -->
    <rect x="1" y="4" width="2" height="1" fill="#f39c12" />
    <rect x="1" y="6" width="2" height="1" fill="#f39c12" />
    <rect x="1" y="8" width="2" height="1" fill="#f39c12" />
    <rect x="1" y="10" width="2" height="1" fill="#f39c12" />

    <!-- Output pins (right) -->
    <rect x="13" y="5" width="2" height="1" fill="#28a745" />
    <rect x="13" y="7" width="2" height="1" fill="#28a745" />
    <rect x="13" y="9" width="2" height="1" fill="#28a745" />

    <!-- Processing indicator (center dot) -->
    <circle cx="8" cy="8" r="1" fill="#ffffff" opacity="0.8" />

    <!-- Auto indicator -->
    <rect x="5" y="6.5" width="6" height="3" fill="none" />
    <text x="8" y="9" text-anchor="middle" fill="white" font-family="monospace" font-size="2.5"
        font-weight="bold">A</text>
</svg>
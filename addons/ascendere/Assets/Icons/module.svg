<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="moduleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#74b9ff" />
            <stop offset="100%" style="stop-color:#0984e3" />
        </linearGradient>
    </defs>

    <!-- Main module body -->
    <rect x="3" y="4" width="10" height="8" rx="1.5" fill="url(#moduleGradient)" stroke="#0574d3" stroke-width="0.5" />

    <!-- Connection ports -->
    <circle cx="2" cy="6" r="1" fill="#636e72" />
    <circle cx="2" cy="8" r="1" fill="#636e72" />
    <circle cx="2" cy="10" r="1" fill="#636e72" />
    <circle cx="14" cy="8" r="1" fill="#636e72" />

    <!-- Module indicator lines -->
    <rect x="5" y="6" width="6" height="0.8" fill="white" opacity="0.7" rx="0.2" />
    <rect x="5" y="8" width="4" height="0.8" fill="white" opacity="0.7" rx="0.2" />
    <rect x="5" y="10" width="5" height="0.8" fill="white" opacity="0.7" rx="0.2" />

    <!-- Corner indicator -->
    <circle cx="11" cy="6" r="0.8" fill="white" opacity="0.8" />
</svg>